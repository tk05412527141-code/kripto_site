<!DOCTYPE html>
<html class="dark" lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anka Exchange | Kripto Sat</title>
    <link rel="icon" type="image/png" href="./logo.png" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="./tailwind-config.js"></script>
    <script src="./theme.js"></script>
    <style>
        .font-space { font-family: 'Space Grotesk', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { min-height: 100dvh; background-color: #060e20; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-24 selection:bg-primary selection:text-on-primary-container">

<header class="fixed top-0 w-full z-50 bg-[#060e20]/80 backdrop-blur-xl border-b border-surface-container-high flex items-center justify-center px-6 h-20 transition-all">
  <div class="max-w-7xl mx-auto flex justify-between items-center w-full">
    <div class="flex items-center gap-3">
        <a href="index.html" class="flex items-center gap-3 transition-transform hover:scale-105 active:scale-95">
           <img src="./logo.png" alt="Anka Exchange Logo" class="w-16 h-16 object-contain drop-shadow-[0_0_12px_rgba(189,157,255,0.6)]" />
           <img src="./logo-text.png" alt="Anka Exchange" class="h-8 md:h-10 object-contain drop-shadow-md hidden sm:block" />
        </a>
    </div>
    <nav class="hidden md:flex flex-1 items-center justify-center gap-8 text-sm font-medium">
        <a href="index.html" class="text-on-surface hover:text-primary transition-colors">Anasayfa</a>
        <a href="kripto-al.html" class="text-on-surface hover:text-primary transition-colors">Kripto Satın Al</a>
        <a href="kripto-sat.html" class="text-primary hover:text-primary-dim transition-all font-bold drop-shadow-[0_0_8px_rgba(189,157,255,0.4)]">Kripto Sat</a>
        <div class="relative group h-full flex items-center">
            <button class="text-on-surface/80 hover:text-primary transition-all flex items-center gap-1 group-hover:text-primary py-2 text-sm font-medium">
              Kurumsal
              <span class="material-symbols-outlined text-[16px] transition-transform duration-300 group-hover:rotate-180">expand_more</span>
            </button>
            <div class="absolute top-[calc(100%-8px)] left-1/2 -translate-x-1/2 w-56 pt-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-[60]">
                <div class="bg-surface-container-high/95 backdrop-blur-2xl border border-outline-variant/20 rounded-2xl p-2 shadow-[0_20px_40px_rgba(0,0,0,0.6)]">
                    <a href="hakkimizda.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-primary/10 hover:text-primary transition-colors text-sm font-medium">Hakkımızda</a>
                    <a href="nasil-calisir.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-primary/10 hover:text-primary transition-colors text-sm font-medium">Nasıl Çalışır?</a>
                    <a href="kyc-dogrulama.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-primary/10 hover:text-primary transition-colors text-sm font-medium">KYC Doğrulama</a>
                </div>
            </div>
        </div>
    </nav>
  </div>
</header>

<main class="pt-28 px-4 max-w-5xl mx-auto">
    <section class="mb-12">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
            <div class="space-y-1">
                <div class="flex items-center gap-3">
                    <h2 class="text-3xl font-headline font-bold text-on-surface">Kripto Satış İlanları</h2>
                    <span class="flex items-center gap-1.5 px-3 py-1 bg-secondary/10 text-secondary rounded-full text-[10px] font-bold uppercase tracking-widest border border-secondary/20">
                        <span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
                        Canlı
                    </span>
                </div>
                <p class="text-on-surface-variant text-sm">Size uygun ilanı seçerek hemen elinizdeki kripto varlıkları nakde çevirin.</p>
            </div>
        </div>

        <div id="p2p-sell-cards" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6">
            <div class="col-span-full py-16 flex flex-col items-center justify-center gap-4 opacity-40">
                <div class="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
                <p class="text-sm font-bold uppercase tracking-widest animate-pulse">İlanlar Yükleniyor...</p>
            </div>
        </div>
    </section>
</main>

<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center h-20 pb-4 bg-[#060e20]/90 backdrop-blur-2xl rounded-t-3xl z-50 border-t border-surface-container-high shadow-[0px_-8px_30px_rgba(0,0,0,0.5)]">
    <a href="index.html" class="flex flex-col items-center justify-center text-on-surface/60 hover:text-primary transition-all active:scale-90">
      <span class="material-symbols-outlined mb-1 text-2xl font-bold">home</span>
      <span class="font-medium text-[10px]">Piyasa</span>
    </a>
    <a href="kripto-al.html" class="flex flex-col items-center justify-center text-on-surface/60 hover:text-primary transition-all active:scale-90">
      <span class="material-symbols-outlined mb-1 text-2xl">add_shopping_cart</span>
      <span class="font-medium text-[10px]">Alış</span>
    </a>
    <a href="kripto-sat.html" class="flex flex-col items-center justify-center text-primary transition-all active:scale-90">
      <span class="material-symbols-outlined mb-1 text-2xl">sell</span>
      <span class="font-medium text-[10px]">Satış</span>
    </a>
</nav>

<script src="./background-3d.js"></script>
<script src="./kripto-sat.js" type="module"></script>
</body>
</html>
